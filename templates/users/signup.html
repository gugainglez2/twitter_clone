{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 border border-gray-200 rounded-lg shadow-sm">
    <h2 class="text-2xl font-bold mb-6 text-center">Criar sua conta</h2>
    <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
            {{ form.as_p }}
        </div>
        <button type="submit" class="w-full bg-blue-500 text-white mt-6 py-2 rounded-full font-bold hover:bg-blue-600">
            Cadastrar
        </button>
    </form>
</div>

<style>
    input { width: 100%; border: 1px solid #e2e8f0; padding: 0.5rem; border-radius: 0.5rem; margin-top: 0.25rem; }
</style>
{% endblock %}
