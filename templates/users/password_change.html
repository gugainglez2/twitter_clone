{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 border border-gray-200 rounded-lg shadow-sm">
    <h2 class="text-2xl font-bold mb-6">Alterar Senha</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-blue-500 text-white mt-6 py-2 rounded-full font-bold">
            Confirmar Nova Senha
        </button>
    </form>
    <div class="mt-4 text-center">
        <a href="{% url 'users:profile' %}" class="text-gray-500 text-sm">Cancelar</a>
    </div>
</div>
<style>input { width: 100%; border: 1px solid #d1d5db; padding: 0.5rem; border-radius: 0.5rem; }</style>
{% endblock %}
