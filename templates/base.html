<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Clone MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="text-blue-500 font-bold text-xl">Twitter Clone</a>
            <div>
                {% if user.is_authenticated %}
                    <a href="{% url 'users:profile' %}" class="text-blue-500 mr-4 font-semibold">Perfil</a>
                    <span class="text-gray-600 mr-4">Olá, @{{ user.username }}</span>
                    <form action="{% url 'users:logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-red-500 hover:underline">Sair</button>
                    </form>
                {% else %}
                    <a href="{% url 'users:login' %}" class="text-blue-500 mr-4">Login</a>
                    <a href="{% url 'users:signup' %}" class="bg-blue-500 text-white px-4 py-2 rounded-full">Cadastrar</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-6 px-4">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
